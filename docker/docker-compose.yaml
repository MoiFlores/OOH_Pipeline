services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: ooh-airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=ooh_airflow_dev_secret_key
      - EXECUTION_BACKEND=emr
      - AWS_CONN_ID=aws_default
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN}
      - EMR_S3_CODE_PREFIX=${EMR_S3_CODE_PREFIX}
      - BRONZE_URI=${BRONZE_URI}
      - SILVER_URI=${SILVER_URI}
      - GOLD_URI=${GOLD_URI}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin || true
      "

  airflow-webserver:
    image: ooh-airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=ooh_airflow_dev_secret_key
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
      - EXECUTION_BACKEND=emr
      - AWS_CONN_ID=aws_default
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN}
      - EMR_S3_CODE_PREFIX=${EMR_S3_CODE_PREFIX}
      - BRONZE_URI=${BRONZE_URI}
      - SILVER_URI=${SILVER_URI}
      - GOLD_URI=${GOLD_URI}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: ooh-airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=ooh_airflow_dev_secret_key
      - EXECUTION_BACKEND=emr
      - AWS_CONN_ID=aws_default
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN}
      - EMR_S3_CODE_PREFIX=${EMR_S3_CODE_PREFIX}
      - BRONZE_URI=${BRONZE_URI}
      - SILVER_URI=${SILVER_URI}
      - GOLD_URI=${GOLD_URI}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
    command: scheduler

  airflow-triggerer:
    image: ooh-airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=ooh_airflow_dev_secret_key
      - EXECUTION_BACKEND=emr
      - AWS_CONN_ID=aws_default
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN}
      - EMR_S3_CODE_PREFIX=${EMR_S3_CODE_PREFIX}
      - BRONZE_URI=${BRONZE_URI}
      - SILVER_URI=${SILVER_URI}
      - GOLD_URI=${GOLD_URI}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
    command: triggerer